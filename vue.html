<script>
export default {
  data() {
    return {
      newListTitle: "",
      lists: []
    };
  },

  methods: {
    addList() {
      if (!this.newListTitle.trim()) return;

      this.lists.push({
        id: Date.now(),
        title: this.newListTitle,
        newTask: "",
        tasks: []
      });

      this.newListTitle = "";
    },

    removeList(listId) {
      this.lists = this.lists.filter(l => l.id !== listId);
    },

    addTask(listId) {
      const list = this.lists.find(l => l.id === listId);
      if (!list || !list.newTask.trim()) return;

      list.tasks.push({
        id: Date.now(),
        text: list.newTask,
        done: false
      });

      list.newTask = "";
    },

    removeTask(listId, taskId) {
      const list = this.lists.find(l => l.id === listId);
      list.tasks = list.tasks.filter(t => t.id !== taskId);
    }
  }
};
</script>

<template>
  <div class="container">
    <h1>📋 Minhas Listas de Tarefas</h1>

    <div class="new-list">
      <input v-model="newListTitle" placeholder="Título da nova lista" />
      <button @click="addList">Adicionar Lista</button>
    </div>

    <div class="lists">
      <div class="list" v-for="list in lists" :key="list.id">

        <div class="list-header">
          <h2>{{ list.title }}</h2>
          <button @click="removeList(list.id)">🗑</button>
        </div>

        <div class="task-input">
          <input
            v-model="list.newTask"
            placeholder="Nova tarefa"
            @keyup.enter="addTask(list.id)"
          />
          <button @click="addTask(list.id)">+</button>
        </div>

        <ul>
          <li v-for="task in list.tasks" :key="task.id">
            <label>
              <input type="checkbox" v-model="task.done" />
              <span :class="{ done: task.done }">
                {{ task.text }}
              </span>
            </label>

            <button @click="removeTask(list.id, task.id)">✖</button>
          </li>
        </ul>

      </div>
    </div>
  </div>
</template>
