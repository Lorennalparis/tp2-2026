<script setup>
import { ref } from 'vue'

const newList = ref('')
const lists = ref([])

function addList() {
  if (newList.value === '') return

  lists.value.push({
    id: Date.now(),
    title: newList.value,
    tasks: [],
    newTask: ''
  })

  newList.value = ''
}

function addTask(list) {
  if (list.newTask === '') return

  list.tasks.push({
    id: Date.now(),
    text: list.newTask,
    done: false
  })

  list.newTask = ''
}
</script>

<template>
  <h1>Minhas Listas</h1>

  <input v-model="newList" placeholder="Nova lista" />
  <button @click="addList">Criar</button>

  <div v-for="list in lists" :key="list.id">
    <h2>{{ list.title }}</h2>

    <input v-model="list.newTask" placeholder="Nova tarefa" />
    <button @click="addTask(list)">Add</button>

    <ul>
      <li v-for="task in list.tasks" :key="task.id">
        <input type="checkbox" v-model="task.done" />
        <span :style="{ textDecoration: task.done ? 'line-through' : 'none' }">
          {{ task.text }}
        </span>
      </li>
    </ul>
  </div>
</template>
